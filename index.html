<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description"
    content="Barney's Bins — The Rubbish Run! A retro arcade game. Drive Barney's bin lorry, collect wheelie bins and dodge obstacles.">
  <title>Barney's Bins — The Rubbish Run!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: -webkit-fill-available;
    }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: 'Courier New', monospace;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      touch-action: none;
    }

    #wrap {
      position: relative;
      width: 100%;
      max-width: 800px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 4px solid #FFD700;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    canvas:focus {
      outline: 3px solid #FFD700;
      outline-offset: 2px;
    }

    #controls {
      color: #aaa;
      font-size: 12px;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    #controls span {
      margin: 0 12px;
    }

    #mobile-controls {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      gap: 6px;
      width: 100%;
    }

    @media (pointer: coarse),
    (max-width: 600px) {
      #mobile-controls {
        display: flex;
      }

      #controls {
        display: none;
      }
    }

    .m-btn {
      background: rgba(255, 215, 0, 0.12);
      border: 2px solid #FFD700;
      color: #FFD700;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      padding: 10px 8px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex: 1;
      text-align: center;
      min-height: 48px;
    }

    .m-btn:active {
      background: rgba(255, 215, 0, 0.35);
    }

    .m-btn:focus {
      outline: 3px solid #FFD700;
      outline-offset: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Portrait auto-rotate */
    @media (orientation: portrait) and (pointer: coarse) {
      body {
        overflow: hidden;
      }
    }

    /* Name-entry overlay */
    #name-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0, 0, 0, 0.88);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: 'Courier New', monospace;
      color: #FFD700;
      text-align: center;
      padding: 24px;
    }

    #name-overlay.visible {
      display: flex;
    }

    #name-overlay h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    #name-overlay p {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 14px;
    }

    #name-input {
      font-family: 'Courier New', monospace;
      font-size: 30px;
      text-transform: uppercase;
      text-align: center;
      width: 200px;
      background: #111;
      color: #FFD700;
      border: 3px solid #FFD700;
      padding: 8px;
      letter-spacing: 8px;
      margin-bottom: 18px;
      border-radius: 4px;
    }

    #name-submit {
      font-family: 'Courier New', monospace;
      background: rgba(255, 215, 0, 0.15);
      color: #FFD700;
      border: 2px solid #FFD700;
      padding: 10px 32px;
      cursor: pointer;
      font-size: 16px;
      border-radius: 6px;
      min-height: 48px;
    }

    #name-submit:active {
      background: rgba(255, 215, 0, 0.4);
    }
  </style>
</head>

<body>
  <noscript>
    <p style="color:#FFD700;text-align:center;padding:2em">JavaScript is required to play Barney's Bins.</p>
  </noscript>
  <div id="wrap" role="main">
    <canvas id="game" width="800" height="450" tabindex="0" role="application"
      aria-label="Barney's Bins — The Rubbish Run! Use arrow keys or W and S to change lane. Space or H to honk. Enter or Space to start.">
    </canvas>
    <div id="game-status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <div id="controls" aria-label="Keyboard controls">
      <span>▲▼ / W S — Change Lane</span>
      <span>SPACE / H — Honk!</span>
      <span>ENTER / SPACE — Start</span>
    </div>
    <div id="mobile-controls" role="group" aria-label="On-screen game controls">
      <button class="m-btn" id="btn-up" aria-label="Move up one lane">▲ UP</button>
      <button class="m-btn" id="btn-honk" aria-label="Honk the horn">HONK</button>
      <button class="m-btn" id="btn-down" aria-label="Move down one lane">▼ DN</button>
    </div>
  </div>
  <div id="name-overlay" role="dialog" aria-modal="true" aria-label="Enter your name for the high score board">
    <h2>&#9733; HIGH SCORE! &#9733;</h2>
    <p>Enter your name (up to 7 characters)</p>
    <input id="name-input" type="text" maxlength="7" autocomplete="off" autocorrect="off" autocapitalize="characters"
      spellcheck="false" aria-label="Your name for the leaderboard">
    <button id="name-submit">OK &#9654;</button>
  </div>

    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1ZXppd3hjaHZyaHBxdmhxZG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njk2MTksImV4cCI6MjA4ODA0NTYxOX0.369ayJ0sPi6M2fh-fj_8Awj8hclf_y6jT4XJPO0g-AQ';     // long string starting with eyJ...
    const SUPABASE_ON = SUPABASE_URL !== 'YOUR_SUPABASE_PROJECT_URL';
    // ─────────────────────────────────────────────────────────────────

    let leaderboard = [];

    function loadLeaderboard() {
      try { leaderboard = JSON.parse(localStorage.getItem('barneysBinsScores') || '[]'); } catch (e) { leaderboard = []; }
    }
    function saveLeaderboard() {
      try { localStorage.setItem('barneysBinsScores', JSON.stringify(leaderboard)); } catch (e) { }
    }

    async function fetchGlobalLeaderboard() {
      if (!SUPABASE_ON) return;
      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/scores?select=name,score&order=score.desc&limit=' + MAX_SCORES,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );
        if (res.ok) { leaderboard = await res.json(); saveLeaderboard(); }
      } catch (e) { }
    }

    async function submitScore(name, s) {
      if (!SUPABASE_ON) return;
      try {
        await fetch(SUPABASE_URL + '/rest/v1/scores', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ name: name, score: s })
        });
        await fetchGlobalLeaderboard();
      } catch (e) { }
    }

    function addToLeaderboard(name, s) {
      const clean = (name.trim().toUpperCase().slice(0, 7)) || 'PLAYER';
      if (SUPABASE_ON) {
        // Optimistically show locally, then sync from server after submit
        leaderboard.push({ name: clean, score: s });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, MAX_SCORES);
        saveLeaderboard();
        submitScore(clean, s); // async — refreshes leaderboard when done
      } else {
        leaderboard.push({ name: clean, score: s });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, MAX_SCORES);
        saveLeaderboard();
      }
    }

    function qualifiesForBoard(s) {

      return s > 0 && (leaderboard.length < MAX_SCORES || s > leaderboard[leaderboard.length - 1].score);

      setTimeout(() => inp.focus(), 150);
      function submit() {
        overlay.classList.remove('visible');
        onDone(inp.value);

      btn.onclick = submit;

    // ==================== SPRITE RENDERER ====================
    function drawSprite(spr, x, y, scale, flipX) {
      const s = P * (scale || 1);
      const rows = spr.d, pal = spr.pal;
      const SW = rows[0].length;
      for (let r = 0; r < rows.length; r++) {
        for (let c = 0; c < rows[r].length; c++) {
          const ci = rows[r][c];
          if (!ci || !pal[ci]) continue;
          ctx.fillStyle = pal[ci];
          const px = flipX ? x + (SW - 1 - c) * s : x + c * s;
          ctx.fillRect(px, y + r * s, s, s);
        }
      }
    }

    // ==================== AUDIO ====================
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') {
        audioCtx.resume().catch(() => { });
        // Play a zero-length silent buffer — required to unlock audio on iOS Safari
        try {
          const buf = audioCtx.createBuffer(1, 1, 22050);
          const src = audioCtx.createBufferSource();
          src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
        } catch (e) { }
      }
    }
    function playTone(freq, dur, type, vol) {
      if (!audioCtx) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = type || 'square';
      o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.start(); o.stop(audioCtx.currentTime + dur);
    }
    function sfxCollect() { playTone(440, 0.04); setTimeout(() => playTone(660, 0.04), 40); setTimeout(() => playTone(880, 0.1), 80); }

    function sfxHonk() { playTone(200, 0.12, 'square', 0.12); setTimeout(() => playTone(170, 0.2, 'square', 0.08), 100); }
    function sfxLevelUp() { [440, 550, 660, 770, 880].forEach((f, i) => setTimeout(() => playTone(f, 0.12), i * 70)); }
    function sfxPothole() { playTone(120, 0.15, 'sawtooth', 0.1); }
    function sfxScared() { playTone(800, 0.05, 'square', 0.08); setTimeout(() => playTone(600, 0.05, 'square', 0.07), 55); setTimeout(() => playTone(900, 0.07, 'square', 0.06), 110); }
    function sfxGameOver() { [440, 392, 349, 330, 294, 262, 220].forEach((f, i) => setTimeout(() => playTone(f, 0.28, 'sine', 0.1), i * 200)); }

        const winY1 = baseY + 14, winY2 = baseY + 44;

      drawSprite(Math.floor(animFrame / 4) % 2 === 0 ? S_RAT : S_RAT_B, x - 18, y - 22, 1);

    // ==================== PARTICLES ====================
    function spawnExhaust(x, y) {
      particles.push({ type: 'smoke', x, y, vx: 0.5 + Math.random() * 0.5, vy: -0.3 - Math.random() * 0.5, life: 40 + Math.random() * 20, maxLife: 60, size: 6 + Math.random() * 6 });
    }
    function spawnHitEffect(x, y) {
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2;
        particles.push({ type: 'spark', x, y, vx: Math.cos(a) * (2 + Math.random() * 3), vy: Math.sin(a) * (2 + Math.random() * 3), life: 20 + Math.random() * 15, maxLife: 35, col: ['#FF5252', '#FF9800', '#FFEB3B'][Math.floor(Math.random() * 3)] });
      }
    }
    function spawnCollectEffect(x, y, col) {
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        particles.push({ type: 'star', x, y, vx: Math.cos(a) * (1.5 + Math.random() * 2), vy: Math.sin(a) * (1.5 + Math.random() * 2) - 1, life: 25 + Math.random() * 10, maxLife: 35, col: col || '#FFD700' });
      }
    }
    function spawnCoffeeEffect(x, y) {
      for (let i = 0; i < 12; i++) {
        const a = (i / 12) * Math.PI * 2;
        particles.push({ type: 'star', x, y, vx: Math.cos(a) * (2 + Math.random() * 3), vy: Math.sin(a) * (2 + Math.random() * 3) - 1.5, life: 35 + Math.random() * 15, maxLife: 50, col: ['#FFD700', '#FF8F00', '#FFFFFF'][Math.floor(Math.random() * 3)] });
      }
    }
    function updateAndDrawParticles() {
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        p.x += p.vx; p.y += p.vy; p.life--;
        if (p.type === 'smoke') {
          ctx.fillStyle = `rgba(176,190,197,${alpha * 0.5})`;
          const s = p.size * (1.5 - alpha); ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
        } else {
          ctx.fillStyle = p.col; ctx.globalAlpha = alpha;
          ctx.fillRect(p.x - 3, p.y - 3, 6, 6); ctx.globalAlpha = 1;
        }
        p.vx *= 0.97; p.vy *= 0.97;
      });
    }
    function spawnScorePopup(x, y, text, col) {
      scorePopups.push({ x, y, text, col: col || COL.uiGold, life: 60 });
    }
    function updateDrawPopups() {
      scorePopups = scorePopups.filter(p => p.life > 0);
      scorePopups.forEach(p => {
        ctx.globalAlpha = p.life / 60; ctx.fillStyle = p.col;
        ctx.font = 'bold 16px Courier New'; ctx.fillText(p.text, p.x, p.y);
        p.y -= 0.8; p.life--; ctx.globalAlpha = 1;
      });
    }

    // ==================== UI ====================
    function drawUI() {
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, 36);

      ctx.fillStyle = COL.uiGold; ctx.font = 'bold 14px Courier New'; ctx.fillText('SCORE', 12, 16);
      ctx.font = 'bold 18px Courier New'; ctx.fillText(String(score).padStart(7, '0'), 12, 34);

      ctx.fillStyle = '#FF8A65'; ctx.font = 'bold 14px Courier New'; ctx.fillText('BEST', 150, 16);
      ctx.font = 'bold 18px Courier New'; ctx.fillText(String(hiScore).padStart(7, '0'), 150, 34);

      ctx.fillStyle = '#80CBC4'; ctx.font = 'bold 14px Courier New'; ctx.fillText('LEVEL', 320, 16);
      ctx.font = 'bold 18px Courier New'; ctx.fillText(String(level), 330, 34);

      // Speed bar
      ctx.fillStyle = '#B0BEC5'; ctx.font = 'bold 12px Courier New'; ctx.fillText('SPEED', 400, 16);
      ctx.fillStyle = COL.roadMd; ctx.fillRect(400, 18, 80, 12);
      ctx.fillStyle = speed > 5 ? '#F44336' : speed > 3.5 ? '#FF9800' : COL.uiGreen;
      ctx.fillRect(400, 18, Math.min(80, (speed * speedMult / 9) * 80), 12);

      // Coffee power-up bar — glows gold across the top when active
      if (coffeeTimer > 0) {
        const ratio = coffeeTimer / COFFEE_DURATION;
        // Full-width bar at very top
        ctx.fillStyle = `rgba(255,215,0,0.25)`;
        ctx.fillRect(0, 0, W, 4);
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(0, 0, W * ratio, 4);
        // Label
        ctx.fillStyle = coffeeTimer < 60 && Math.floor(frameCount / 8) % 2 === 0 ? '#FF5252' : '#FFD700';
        ctx.font = 'bold 11px Courier New';
        ctx.fillText('ZOOM! ' + Math.ceil(coffeeTimer / 60) + 's', W / 2 - 28, 34);
      }

      // Lives hearts
      ctx.fillStyle = '#EF9A9A'; ctx.font = 'bold 14px Courier New'; ctx.fillText('LIVES', W - 130, 16);
      for (let i = 0; i < 3; i++) drawHeart(W - 120 + i * 34, 20, i < lives);
    }

    function drawHeart(x, y, filled) {
      ctx.fillStyle = filled ? COL.uiRed : '#37474F';
      ctx.fillRect(x + 2, y, 6, 4); ctx.fillRect(x + 12, y, 6, 4);
      ctx.fillRect(x, y + 4, 20, 6); ctx.fillRect(x + 2, y + 10, 16, 4);
      ctx.fillRect(x + 4, y + 14, 12, 4); ctx.fillRect(x + 6, y + 18, 8, 4);
      ctx.fillRect(x + 8, y + 22, 4, 4);
      if (filled) { ctx.fillStyle = '#FF8A80'; ctx.fillRect(x + 4, y + 2, 3, 3); }
    }
    function drawHitFlash() {
      if (flashTimer > 0) {
        ctx.fillStyle = `rgba(255,0,0,${(flashTimer / 20) * 0.35})`;
        ctx.fillRect(0, 0, W, H); flashTimer--;
      }
    }

    // ==================== HONK DODGE MECHANIC ====================
    function honkNearby() {
      obstacles.forEach(obs => {
        if (!obs.active || obs.dodging) return;
        if (obs.type !== 'miggins' && obs.type !== 'grumpy') return;
        if (obs.lane !== barneyLane && obs.lane !== barneyTargetLane) return;
        const dist = obs.x - WAGON_X;
        if (dist < 10 || dist > 360) return;
        obs.dodging = true; obs.dodgeVy = -3.8;
        score += 10; if (score > hiScore) hiScore = score;
        spawnScorePopup(obs.x, obs.y - 50, 'MOVE IT! +10', COL.uiGold);
        sfxScared();
      });
    }

    // ==================== SPAWN ====================
    let nextSpawn = 80;
    function getSpawnInterval() {
      return Math.max(40, 100 - level * 8 - Math.floor(score / 500) * 3);
    }
    function spawnEntity() {
      const lane = Math.floor(Math.random() * 3);
      const roll = Math.random();
      const obsChance = 0.45 + level * 0.06;
      if (roll < obsChance) {
        const oRoll = Math.random();
        let type;
        if (oRoll < 0.25) type = 'pothole';
        else if (oRoll < 0.5) type = 'rubbish';
        else if (oRoll < 0.75) type = 'miggins';
        else type = 'grumpy';
        if (Math.random() < 0.15) type = 'rat';
        const ent = new Entity(type, lane, SPAWN_X);
        obstacles.push(ent);
      } else {
        const cRoll = Math.random();
        // Green bin 55%, coffee 20%, blue recycle bin 25%
        const type = cRoll < 0.55 ? 'bin' : cRoll < 0.75 ? 'coffee' : 'bluebin';
        collectibles.push(new Entity(type, lane, SPAWN_X));
      }
    }

    // ==================== COLLISION ====================
    function checkCollisions() {
      const wagLeft = WAGON_X - 95, wagRight = WAGON_X + 75;
      // Obstacles: only dangerous when NOT invincible
      if (invTimer <= 0) {
        obstacles.forEach(obs => {
          if (!obs.active || obs.dodging) return;
          if (obs.lane !== barneyLane && obs.lane !== barneyTargetLane) return;
          if (obs.x < wagLeft || obs.x > wagRight) return;
          handleObstacleHit(obs);
        });
      }
      // Collectibles: always collected, even during coffee invincibility
      collectibles.forEach(col => {
        if (!col.active) return;
        if (col.lane !== barneyLane && col.lane !== barneyTargetLane) return;
        if (col.x < wagLeft - 20 || col.x > wagRight + 20) return;
        handleCollect(col);
      });
    }

    function handleObstacleHit(obs) {
      obs.active = false; lives--;
      if (lives <= 0) {
        if (score > hiScore) hiScore = score;
        sfxGameOver();
        announceStatus('Game over! Final score: ' + score + '. Press Enter or Space to try again.');
        if (qualifiesForBoard(score)) {
          state = 'gameover';
          showNameEntry(function (name) { addToLeaderboard(name, score); });
        } else {
          state = 'gameover';
        }
        return;
      }
      invTimer = HIT_COOL; flashTimer = 20;
      wagonBounce = (obs.type === 'pothole') ? 12 : 0;
      barneyFace = 'oof'; barneyFaceTimer = 80;
      sfxHit(); spawnHitEffect(WAGON_X + 40, barneyY - 20);
      let msg = '';
      if (obs.type === 'pothole') { sfxPothole(); spawnScorePopup(WAGON_X, barneyY - 60, 'OUCH!', COL.uiRed); msg = 'Hit a pothole!'; }
      else if (obs.type === 'miggins' || obs.type === 'grumpy') { spawnScorePopup(WAGON_X, barneyY - 60, 'OI!!', '#FF8F00'); msg = 'Hit by a resident!'; }
      else { spawnScorePopup(WAGON_X, barneyY - 60, 'SQUEAK!', '#F48FB1'); msg = 'Hit a rat!'; }
      announceStatus(msg + ' ' + lives + ' lives remaining.');
    }

    function handleCollect(col) {
      col.active = false;
      if (col.type === 'bin') {
        score += 50; if (score > hiScore) hiScore = score;
        spawnScorePopup(col.x, col.y - 30, '+50', COL.uiGreen);
        sfxCollect(); spawnCollectEffect(col.x, col.y, '#FFD700');
      }
      if (col.type === 'bluebin') {
        score += 100; if (score > hiScore) hiScore = score;
        spawnScorePopup(col.x, col.y - 30, '+100 RECYCLE!', COL.uiBlue);
        sfxBonusCollect(); spawnCollectEffect(col.x, col.y, '#42A5F5');
      }
      if (col.type === 'coffee') {
        score += 25; if (score > hiScore) hiScore = score;
        // Coffee = speed boost + 3 second golden invulnerability
        coffeeTimer = COFFEE_DURATION;
        speedMult = 1.5;
        invTimer = Math.max(invTimer, COFFEE_DURATION);
        spawnScorePopup(col.x, col.y - 30, '+25 ZOOM!', '#FF8F00');
        sfxCoffee(); spawnCoffeeEffect(col.x, col.y);
        announceStatus('Coffee! Speed boost and 3 seconds of invulnerability!');
      }
      barneyFace = 'normal'; barneyFaceTimer = 40;
    }

    // ==================== UPDATE ====================
    function update() {
      bgScroll += speed * speedMult * 0.5;
      roadScroll += speed * speedMult;
      exhaustTimer--;

      // Lane lerp
      const targetY = LANE_Y[barneyTargetLane];
      barneyY += (targetY - barneyY) * 0.15;
      if (Math.abs(barneyY - targetY) < 1) { barneyY = targetY; barneyLane = barneyTargetLane; }

      // Bounce decay
      if (wagonBounce > 0) wagonBounce = Math.max(0, wagonBounce - 1.5);

      // Face management
      if (barneyFaceTimer > 0) { barneyFaceTimer--; if (barneyFaceTimer === 0) barneyFace = 'normal'; }
      blinkTimer--;
      if (blinkTimer <= 0) { barneyFace = 'blink'; barneyFaceTimer = 8; blinkTimer = 180 + Math.floor(Math.random() * 120); }

      if (invTimer > 0) invTimer--;
      if (honkTimer > 0) honkTimer--;

      // Coffee power-up countdown
      if (coffeeTimer > 0) {
        coffeeTimer--;
        invTimer = Math.max(invTimer, 1); // stay invulnerable for full duration
        if (coffeeTimer === 0) {
          speedMult = 1;
          announceStatus('Speed boost ended.');
        }
      }

      // Distance score
      if (frameCount % 60 === 0) score += level;

      // Level up
      const newLevel = 1 + Math.floor(score / 800);
      if (newLevel > level) {
        level = newLevel;
        speed = Math.min(8, 3.0 + level * 0.4);  // slightly steeper curve
        sfxLevelUp();
        spawnScorePopup(W / 2 - 50, H / 2, `LEVEL ${level}!`, COL.uiGold);
        announceStatus('Level ' + level + '! Speed increasing.');
      }

      // Spawn
      nextSpawn--;
      if (nextSpawn <= 0) { spawnEntity(); nextSpawn = getSpawnInterval() + Math.floor(Math.random() * 20); }

      // Move entities
      obstacles.forEach(o => {
        o.x -= speed * speedMult; o.frame++;
        if (o.dodging) { o.y += o.dodgeVy; if (o.y < ROAD_TOP - 70) o.active = false; }
      });
      collectibles.forEach(c => { c.x -= speed * speedMult; c.frame++; });
      obstacles = obstacles.filter(o => o.x > -200 && o.active);
      collectibles = collectibles.filter(c => c.x > -200 && c.active);

      checkCollisions();
    }

    // ==================== DRAW ====================
    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawSky(); drawClouds(); drawBuildings(); drawLampPosts(); drawPavement(); drawRoad();

      collectibles.forEach(c => {
        const bob = Math.sin(frameCount * 0.08 + c.x * 0.01) * 4;
        if (c.type === 'bin') drawBin(c.x, c.y, bob);
        if (c.type === 'bluebin') drawBlueBin(c.x, c.y, bob);
        if (c.type === 'coffee') drawCoffeeCup(c.x, c.y, bob);
      });

      obstacles.forEach(o => {
        if (o.type === 'pothole') drawPothole(o.x, o.y);
        if (o.type === 'rubbish') drawRubbishPile(o.x, o.y);
        if (o.dodging) { drawScaredNPC(o.type, o.x, o.y); }
        else {
          if (o.type === 'miggins') drawMrsMiggins(o.x, o.y, o.frame);
          if (o.type === 'grumpy') drawMrGrumpy(o.x, o.y, o.frame);
        }
        if (o.type === 'rat') drawRat(o.x, o.y, o.frame);
      });

      // Wagon — golden during coffee boost, flickers during hit invulnerability
      const bounce = Math.sin(wagonBounce * 0.8) * wagonBounce * 0.8;
      if (coffeeTimer > 0) {
        drawWagon(WAGON_X, barneyY, bounce, true);   // solid gold, no flicker
      } else if (invTimer <= 0 || Math.floor(invTimer / 6) % 2 === 0) {
        drawWagon(WAGON_X, barneyY, bounce, false);  // normal or flickering
      }

      updateAndDrawParticles();
      updateDrawPopups();
      drawUI();
      drawHitFlash();
    }

    // ==================== SCREENS ====================

      drawSky(); drawClouds(); drawBuildings(); drawLampPosts(); drawPavement(); drawRoad();
      ctx.fillStyle = 'rgba(0,0,0,0.78)'; ctx.fillRect(80, 60, 640, 330);

      drawSprite(S_BARNEY_FACE, 190, 180, 1.4);

      const topEntry = leaderboard[0];

      else if (hiScore > 0) { ctx.fillStyle = '#FF8A65'; ctx.font = 'bold 14px Courier New'; ctx.fillText(`BEST: ${hiScore}`, 360, 58); }

    function drawGameOver() {
      draw();
      // Background panel — taller to fit leaderboard
      ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(130, 60, 540, 340);
      ctx.fillStyle = COL.uiRed; ctx.fillRect(130, 60, 540, 5); ctx.fillRect(130, 395, 540, 5);
      // Title + sprite
      ctx.fillStyle = COL.uiRed; ctx.font = 'bold 38px Courier New'; ctx.fillText('GAME OVER!', 205, 120);
      drawSprite(S_BARNEY_OOF, 600, 68, 1.1);
      // Score
      ctx.fillStyle = COL.uiGold; ctx.font = 'bold 20px Courier New';
      ctx.fillText(`YOUR SCORE: ${String(score).padStart(7, '0')}`, 195, 160);
      if (score > 0 && score >= hiScore) { ctx.fillStyle = '#FF8A65'; ctx.font = 'bold 14px Courier New'; ctx.fillText('★ NEW PERSONAL BEST! ★', 250, 183); }
      // Leaderboard
      ctx.fillStyle = '#80CBC4'; ctx.font = 'bold 13px Courier New';
      const boardLabel = SUPABASE_ON ? '─── GLOBAL HIGH SCORES ───' : '─── HIGH SCORES ───';
      ctx.fillText(boardLabel, SUPABASE_ON ? 238 : 270, 210);
      if (leaderboard.length === 0) {
        ctx.fillStyle = '#666'; ctx.font = '13px Courier New'; ctx.fillText('No scores yet — be the first!', 235, 235);
      } else {
        leaderboard.forEach(function (entry, i) {
          const highlight = entry.score === score;
          ctx.fillStyle = highlight ? COL.uiGold : (i === 0 ? '#FF8A65' : '#B0BEC5');
          ctx.font = (highlight ? 'bold' : '') + ' 13px Courier New';
          const medal = i === 0 ? '★' : (i === 1 ? '✦' : (i === 2 ? '•' : ' '));
          ctx.fillText(medal + ' ' + (i + 1) + '. ' + entry.name.padEnd(7) + ' ' + String(entry.score).padStart(7, '0'), 218, 232 + i * 22);
        });
      }
      // Restart prompt
      ctx.fillStyle = COL.uiGreen; ctx.font = 'bold 15px Courier New';
      if (Math.floor(frameCount / 25) % 2 === 0) ctx.fillText('PRESS ENTER, SPACE OR TAP TO PLAY AGAIN', 152, 378);
    }

    // ==================== GAME CONTROL ====================
    function startGame() {
      ensureAudio();
      state = 'playing';
      score = 0; lives = 3; level = 1;
      speed = 3.0; speedMult = 1; coffeeTimer = 0;
      barneyLane = 1; barneyTargetLane = 1; barneyY = LANE_Y[1];
      obstacles = []; collectibles = []; particles = []; scorePopups = [];
      nextSpawn = 80; invTimer = 0; flashTimer = 0; wagonBounce = 0;
      barneyFace = 'normal'; barneyFaceTimer = 0; blinkTimer = 200;
      frameCount = 0; roadScroll = 0;
      announceStatus('Game started. Level 1. 3 lives. Grab coffee for a speed boost!');
      canvas.focus();
    }

    // ==================== INPUT ====================
    const keys = {};
    document.addEventListener('keydown', e => {
      if (keys[e.code]) return;
      keys[e.code] = true; ensureAudio();
      if (state === 'playing') {
        if ((e.code === 'ArrowUp' || e.code === 'KeyW') && barneyTargetLane > 0) barneyTargetLane--;
        if ((e.code === 'ArrowDown' || e.code === 'KeyS') && barneyTargetLane < 2) barneyTargetLane++;
        if (e.code === 'Space' || e.code === 'KeyH') { if (honkTimer <= 0) { sfxHonk(); honkTimer = 45; honkNearby(); } }
      } else { if (e.code === 'Enter' || e.code === 'Space') startGame(); }
      if (['ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    let touchStartY = 0;
    canvas.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; ensureAudio(); if (state !== 'playing') startGame(); e.preventDefault(); }, { passive: false });
    canvas.addEventListener('touchend', e => {
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (state === 'playing') {
        if (dy < -20 && barneyTargetLane > 0) barneyTargetLane--;
        if (dy > 20 && barneyTargetLane < 2) barneyTargetLane++;
        if (Math.abs(dy) < 15) { if (honkTimer <= 0) { sfxHonk(); honkTimer = 45; honkNearby(); } }
      }
      e.preventDefault();
    }, { passive: false });

    // ==================== MOBILE BUTTONS ====================
    function setupMobileButtons() {
      const btnUp = document.getElementById('btn-up'), btnDown = document.getElementById('btn-down'), btnHonk = document.getElementById('btn-honk');
      if (!btnUp) return;
      const onUp = e => { e.preventDefault(); ensureAudio(); if (state === 'playing') { if (barneyTargetLane > 0) barneyTargetLane--; } else startGame(); };
      const onDown = e => { e.preventDefault(); ensureAudio(); if (state === 'playing') { if (barneyTargetLane < 2) barneyTargetLane++; } else startGame(); };
      const onHonk = e => { e.preventDefault(); ensureAudio(); if (state === 'playing') { if (honkTimer <= 0) { sfxHonk(); honkTimer = 45; honkNearby(); } } else startGame(); };
      btnUp.addEventListener('touchstart', onUp, { passive: false }); btnUp.addEventListener('mousedown', onUp);
      btnDown.addEventListener('touchstart', onDown, { passive: false }); btnDown.addEventListener('mousedown', onDown);
      btnHonk.addEventListener('touchstart', onHonk, { passive: false }); btnHonk.addEventListener('mousedown', onHonk);
    }
    setupMobileButtons();

    // ==================== GAME LOOP ====================
    function loop() {
      frameCount++;
      if (state === 'menu') { bgScroll += 0.5; drawMenu(); }
      else if (state === 'playing') { update(); draw(); }
      else if (state === 'gameover') { bgScroll += 0.2; drawGameOver(); }
      requestAnimationFrame(loop);
    }

    // ==================== INIT ====================
    // Explicitly set canvas height from its rendered width (fallback for browsers
    // where height:auto on <canvas> doesn't honour the intrinsic 800:450 ratio)
    const wrap = document.getElementById('wrap');
    function fixCanvasHeight() {
      const portrait = window.innerHeight > window.innerWidth && 'ontouchstart' in window;
      if (portrait) {
        // Rotate the entire game area so it appears landscape on portrait phones
        // maxW = the largest game width that fits once rotated into portrait viewport
        const maxW = Math.min(window.innerHeight, window.innerWidth * 16 / 9);
        const gameH = Math.round(maxW * 9 / 16);
        wrap.style.position = 'fixed';
        wrap.style.left = '50%';
        wrap.style.top = '50%';
        wrap.style.maxWidth = 'none';
        wrap.style.width = Math.floor(maxW) + 'px';
        wrap.style.transform = 'translate(-50%, -50%) rotate(-90deg)';
        canvas.style.width = '100%';
        canvas.style.height = gameH + 'px';
      } else {
        wrap.style.position = '';
        wrap.style.left = '';
        wrap.style.top = '';
        wrap.style.maxWidth = '800px';
        wrap.style.width = '';
        wrap.style.transform = '';
        canvas.style.width = '100%';
        canvas.style.height = Math.round(canvas.offsetWidth * 9 / 16) + 'px';
      }
    }
    window.addEventListener('resize', fixCanvasHeight);
    window.addEventListener('orientationchange', function () { setTimeout(fixCanvasHeight, 200); });
    fixCanvasHeight();
    initClouds();
    loop();
  </script>
</body>

</html>

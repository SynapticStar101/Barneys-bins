<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description"
    content="Barney's Bins — The Rubbish Run! A retro arcade game. Drive Barney's bin lorry, collect wheelie bins and dodge obstacles.">
  <title>Barney's Bins — The Rubbish Run!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: -webkit-fill-available;
    }

    body {
      background: #0d0d1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      font-family: 'Courier New', monospace;
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
      touch-action: none;
    }

    #wrap {
      position: relative;
      width: 100%;
      max-width: 800px;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      border: 4px solid #FFD700;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    canvas:focus {
      outline: 3px solid #FFD700;
      outline-offset: 2px;
    }

    #controls {
      color: #aaa;
      font-size: 12px;
      text-align: center;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    #controls span {
      margin: 0 12px;
    }

    #mobile-controls {
      display: none;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      gap: 6px;
      width: 100%;
    }

    @media (pointer: coarse),
    (max-width: 600px) {
      #mobile-controls {
        display: flex;
      }

      #controls {
        display: none;
      }
    }

    .m-btn {
      background: rgba(255, 215, 0, 0.12);
      border: 2px solid #FFD700;
      color: #FFD700;
      font-family: 'Courier New', monospace;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      padding: 10px 8px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      flex: 1;
      text-align: center;
      min-height: 48px;
    }

    .m-btn:active {
      background: rgba(255, 215, 0, 0.35);
    }

    .m-btn:focus {
      outline: 3px solid #FFD700;
      outline-offset: 2px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }



    /* Name-entry overlay */
    #name-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(0, 0, 0, 0.88);
      align-items: center;
      justify-content: center;
      flex-direction: column;
      font-family: 'Courier New', monospace;
      color: #FFD700;
      text-align: center;
      padding: 24px;
    }

    #name-overlay.visible {
      display: flex;
    }

    #name-overlay h2 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    #name-overlay p {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 14px;
    }

    #name-input {
      font-family: 'Courier New', monospace;
      font-size: 30px;
      text-transform: uppercase;
      text-align: center;
      width: 200px;
      background: #111;
      color: #FFD700;
      border: 3px solid #FFD700;
      padding: 8px;
      letter-spacing: 8px;
      margin-bottom: 18px;
      border-radius: 4px;
    }

    #name-submit {
      font-family: 'Courier New', monospace;
      background: rgba(255, 215, 0, 0.15);
      color: #FFD700;
      border: 2px solid #FFD700;
      padding: 10px 32px;
      cursor: pointer;
      font-size: 16px;
      border-radius: 6px;
      min-height: 48px;
    }

    #name-submit:active {
      background: rgba(255, 215, 0, 0.4);
    }
  </style>
</head>

<body>
  <noscript>
    <p style="color:#FFD700;text-align:center;padding:2em">JavaScript is required to play Barney's Bins.</p>
  </noscript>
  <div id="wrap" role="main">
    <canvas id="game" width="800" height="450" tabindex="0" role="application"
      aria-label="Barney's Bins — The Rubbish Run! Use arrow keys or W and S to change lane. Space or H to honk. Enter or Space to start.">
    </canvas>
    <div id="game-status" aria-live="polite" aria-atomic="true" class="sr-only"></div>
    <div id="controls" aria-label="Keyboard controls">
      <span>▲▼ / W S — Change Lane</span>
      <span>SPACE / H — Honk!</span>
      <span>ENTER / SPACE — Start</span>
    </div>
    <div id="mobile-controls" role="group" aria-label="On-screen game controls">
      <button class="m-btn" id="btn-up" aria-label="Move up one lane">▲ UP</button>
      <button class="m-btn" id="btn-honk" aria-label="Honk the horn">HONK</button>
      <button class="m-btn" id="btn-down" aria-label="Move down one lane">▼ DN</button>
      <button class="m-btn" id="btn-snd" aria-label="Enable sound" style="flex:0 0 auto;min-width:48px;font-size:22px;border-color:#80CBC4;color:#80CBC4;">🔊</button>
    </div>
  </div>
  <div id="name-overlay" role="dialog" aria-modal="true" aria-label="Enter your name for the high score board">
    <h2>&#9733; HIGH SCORE! &#9733;</h2>
    <p>Enter your name (up to 7 characters)</p>
    <input id="name-input" type="text" maxlength="7" autocomplete="off" autocorrect="off" autocapitalize="characters"
      spellcheck="false" aria-label="Your name for the leaderboard">
    <button id="name-submit">OK &#9654;</button>
  </div>

    // ============================================================
    //  BARNEY'S BINS — THE RUBBISH RUN!

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // ==================== LEADERBOARD ====================
    const MAX_SCORES = 7;

    // ── Supabase global leaderboard ──────────────────────────────────

    //       create table scores (
    //         id bigserial primary key,
    //         name text not null,
    //         score integer not null,
    //         created_at timestamptz default now()
    //       );
    //       alter table scores enable row level security;
    //       create policy "read"   on scores for select using (true);
    //       create policy "insert" on scores for insert with check (score >= 0 and length(name) <= 7);
    //  3. Go to Settings → API, copy your Project URL and anon public key
    //  4. Paste them in the two lines below and push to GitHub
    const SUPABASE_URL = 'https://rueziwxchvrhpqvhqdom.supabase.co';  // e.g. https://abcxyz.supabase.co
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1ZXppd3hjaHZyaHBxdmhxZG9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Njk2MTksImV4cCI6MjA4ODA0NTYxOX0.369ayJ0sPi6M2fh-fj_8Awj8hclf_y6jT4XJPO0g-AQ';     // long string starting with eyJ...
    const SUPABASE_ON = SUPABASE_URL !== 'YOUR_SUPABASE_PROJECT_URL';
    // ─────────────────────────────────────────────────────────────────

    let leaderboard = [];

    function loadLeaderboard() {
      try { leaderboard = JSON.parse(localStorage.getItem('barneysBinsScores') || '[]'); } catch (e) { leaderboard = []; }
    }
    function saveLeaderboard() {
      try { localStorage.setItem('barneysBinsScores', JSON.stringify(leaderboard)); } catch (e) { }
    }

    async function fetchGlobalLeaderboard() {
      if (!SUPABASE_ON) return;
      try {
        const res = await fetch(
          SUPABASE_URL + '/rest/v1/scores?select=name,score&order=score.desc&limit=' + MAX_SCORES,
          { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY } }
        );
        if (res.ok) { leaderboard = await res.json(); saveLeaderboard(); }
      } catch (e) { }
    }

    async function submitScore(name, s) {
      if (!SUPABASE_ON) return;
      try {
        await fetch(SUPABASE_URL + '/rest/v1/scores', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + SUPABASE_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify({ name: name, score: s })
        });
        await fetchGlobalLeaderboard();
      } catch (e) { }
    }

    function addToLeaderboard(name, s) {
      const clean = (name.trim().toUpperCase().slice(0, 7)) || 'PLAYER';
      if (SUPABASE_ON) {
        // Optimistically show locally, then sync from server after submit
        leaderboard.push({ name: clean, score: s });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, MAX_SCORES);
        saveLeaderboard();
        submitScore(clean, s); // async — refreshes leaderboard when done
      } else {
        leaderboard.push({ name: clean, score: s });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard = leaderboard.slice(0, MAX_SCORES);
        saveLeaderboard();
      }
    }

    // With a global board every score > 0 qualifies (server holds all-time records).
    // Without Supabase, only top-7 local scores qualify.
    function qualifiesForBoard(s) {
      if (SUPABASE_ON) return s > 0;
      return s > 0 && (leaderboard.length < MAX_SCORES || s > leaderboard[leaderboard.length - 1].score);
    }

    function showNameEntry(onDone) {
      const overlay = document.getElementById('name-overlay');
      const inp = document.getElementById('name-input');
      const btn = document.getElementById('name-submit');
      inp.value = '';
      overlay.classList.add('visible');
      setTimeout(() => inp.focus(), 150);
      function submit() {
        overlay.classList.remove('visible');
        onDone(inp.value);
      }
      btn.onclick = submit;
      inp.onkeydown = e => { if (e.key === 'Enter') submit(); };
    }

    // ==================== SPRITE RENDERER ====================
    function drawSprite(spr, x, y, scale, flipX) {
      const s = P * (scale || 1);
      const rows = spr.d, pal = spr.pal;
      const SW = rows[0].length;
      for (let r = 0; r < rows.length; r++) {
        for (let c = 0; c < rows[r].length; c++) {
          const ci = rows[r][c];
          if (!ci || !pal[ci]) continue;
          ctx.fillStyle = pal[ci];
          const px = flipX ? x + (SW - 1 - c) * s : x + c * s;
          ctx.fillRect(px, y + r * s, s, s);
        }
      }
    }

    // ==================== AUDIO ====================
    let audioCtx = null;
    let audioUnlocked = false;   // true once AudioContext confirmed 'running'
    let _audioUnlockPoll = null; // interval id while waiting for unlock

    function onAudioUnlocked() {
      // Re-trigger whatever music track was queued — context is now running
      var id = bgMusicId;
      bgMusicId = null;
      if      (state === 'menu')     startBgMusic('menu',     menuTrack);
      else if (state === 'gameover') startBgMusic('gameover', gameOverTrack);
      // Show ✓ on sound button then hide it
      var btn = document.getElementById('btn-snd');
      if (btn) { btn.textContent = '✓'; setTimeout(function() { btn.style.display = 'none'; }, 700); }
    }

    function ensureAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return; }
      }
      // If already running, mark unlocked and return
      if (audioCtx.state === 'running') {
        if (!audioUnlocked) { audioUnlocked = true; onAudioUnlocked(); }
        return;
      }
      // iOS Safari unlock: play silent buffer SYNCHRONOUSLY within the gesture,
      // then call resume(). Both must happen before the call stack unwinds.
      try {
        var buf = audioCtx.createBuffer(1, 1, audioCtx.sampleRate);
        var src = audioCtx.createBufferSource();
        src.buffer = buf; src.connect(audioCtx.destination); src.start(0);
      } catch(e) {}
      audioCtx.resume().catch(function() {});
      // Poll every 50 ms until context confirms 'running' (async on some iOS versions)
      if (!_audioUnlockPoll) {
        _audioUnlockPoll = setInterval(function() {
          if (audioCtx && audioCtx.state === 'running' && !audioUnlocked) {
            clearInterval(_audioUnlockPoll); _audioUnlockPoll = null;
            audioUnlocked = true;
            onAudioUnlocked();
          }
        }, 50);
        // Stop polling after 6 s regardless
        setTimeout(function() {
          if (_audioUnlockPoll) { clearInterval(_audioUnlockPoll); _audioUnlockPoll = null; }
        }, 6000);
      }
    }
    function playTone(freq, dur, type, vol) {
      if (!audioCtx || audioCtx.state !== 'running') return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = type || 'square';
      o.frequency.setValueAtTime(freq, audioCtx.currentTime);
      g.gain.setValueAtTime(vol || 0.08, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.start(); o.stop(audioCtx.currentTime + dur);
    }

    // ==================== BACKGROUND MUSIC ====================
    let bgMusicTimer = null;
    let bgMusicId    = null;

    function _mn(freq, t, dur, type, vol) {           // schedule one note
      if (!audioCtx || audioCtx.state !== 'running' || freq <= 0) return;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol, t + 0.018);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.80);
      o.start(t); o.stop(t + dur);
    }

    function stopBgMusic() {
      clearTimeout(bgMusicTimer); bgMusicTimer = null; bgMusicId = null;
    }

    function startBgMusic(id, trackFn) {
      if (bgMusicId === id) return;          // already playing this track
      stopBgMusic();
      if (!audioCtx) return;
      bgMusicId = id;
      function kick() {
        if (bgMusicId !== id) return;
        (function tick() {
          if (bgMusicId !== id) return;
          const dur = trackFn(audioCtx.currentTime + 0.08);
          bgMusicTimer = setTimeout(tick, Math.max(0, (dur - 0.12) * 1000));
        })();
      }
      if (audioCtx.state === 'running') {
        kick();
      } else {
        audioCtx.resume().then(kick).catch(function() {});
      }
    }

    let _particleDt = 1; // set by draw() before particle update
    function updateAndDrawParticles() {
      const dt = _particleDt;
      particles = particles.filter(p => p.life > 0);
      particles.forEach(p => {
        p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
        p.vx *= Math.pow(0.97, dt); p.vy *= Math.pow(0.97, dt);
        const alpha = Math.max(0, p.life / p.maxLife);
        if (p.type === 'smoke') {
          ctx.fillStyle = `rgba(176,190,197,${alpha * 0.5})`;
          const s = p.size * (1.5 - alpha); ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
        } else {
          ctx.fillStyle = p.col; ctx.globalAlpha = alpha;
          ctx.fillRect(p.x - 3, p.y - 3, 6, 6); ctx.globalAlpha = 1;
        }
      });
    }

    // ==================== HONK DODGE MECHANIC ====================
    function honkNearby() {
      obstacles.forEach(obs => {
        if (!obs.active || obs.dodging) return;
        if (obs.type !== 'miggins' && obs.type !== 'grumpy') return;
        if (obs.lane !== barneyLane && obs.lane !== barneyTargetLane) return;
        const dist = obs.x - WAGON_X;
        if (dist < 10 || dist > 360) return;
        obs.dodging = true; obs.dodgeVy = -3.8;
        score += 10; if (score > hiScore) hiScore = score;
        spawnScorePopup(obs.x, obs.y - 50, 'MOVE IT! +10', COL.uiGold);
        sfxScared();
      });
    }

    // ==================== SPAWN ====================
    let nextSpawn = 80;
    function getSpawnInterval() {
      return Math.max(40, 100 - level * 8 - Math.floor(score / 500) * 3);
    }
    function spawnEntity() {
      const lane = Math.floor(Math.random() * 3);
      if (bonusRound) {
        // Bonus round: only gold bins and coffee — no obstacles
        const type = Math.random() < 0.75 ? 'goldbin' : 'coffee';
        collectibles.push(new Entity(type, lane, SPAWN_X));
        return;
      }
      const roll = Math.random();
      const obsChance = 0.45 + level * 0.06;
      if (roll < obsChance) {
        const oRoll = Math.random();
        let type;
        if (oRoll < 0.25) type = 'pothole';
        else if (oRoll < 0.5) type = 'rubbish';
        else if (oRoll < 0.75) type = 'miggins';
        else type = 'grumpy';
        if (Math.random() < 0.15) type = 'rat';
        obstacles.push(new Entity(type, lane, SPAWN_X));
      } else {
        const cRoll = Math.random();
        // Green bin 55%, coffee 20%, blue recycle bin 25%
        const type = cRoll < 0.55 ? 'bin' : cRoll < 0.75 ? 'coffee' : 'bluebin';
        collectibles.push(new Entity(type, lane, SPAWN_X));
      }
    }

    // ==================== COLLISION ====================
    function checkCollisions() {
      const wagLeft = WAGON_X - 95, wagRight = WAGON_X + 75;
      // Obstacles: only dangerous when NOT invincible
      if (invTimer <= 0) {
        obstacles.forEach(obs => {
          if (!obs.active || obs.dodging) return;
          if (obs.lane !== barneyLane && obs.lane !== barneyTargetLane) return;
          if (obs.x < wagLeft || obs.x > wagRight) return;
          handleObstacleHit(obs);
        });
      }
      // Collectibles: always collected, even during coffee invincibility
      collectibles.forEach(col => {
        if (!col.active) return;
        if (col.lane !== barneyLane && col.lane !== barneyTargetLane) return;
        if (col.x < wagLeft - 20 || col.x > wagRight + 20) return;
        handleCollect(col);
      });
    }

    function handleObstacleHit(obs) {
      obs.active = false; lives--;
      if (lives <= 0) {
        if (score > hiScore) hiScore = score;
        sfxGameOver();
        announceStatus('Game over! Final score: ' + score + '. Press Enter or Space to try again.');
        if (qualifiesForBoard(score)) {
          state = 'gameover';
          showNameEntry(function (name) { addToLeaderboard(name, score); });
        } else {
          state = 'gameover';
        }
        return;
      }
      invTimer = HIT_COOL; flashTimer = 20;
      wagonBounce = (obs.type === 'pothole') ? 12 : 0;
      barneyFace = 'oof'; barneyFaceTimer = 80;
      sfxHit(); spawnHitEffect(WAGON_X + 40, barneyY - 20);
      let msg = '';
      if (obs.type === 'pothole') { sfxPothole(); spawnScorePopup(WAGON_X, barneyY - 60, 'OUCH!', COL.uiRed); msg = 'Hit a pothole!'; }
      else if (obs.type === 'miggins' || obs.type === 'grumpy') { spawnScorePopup(WAGON_X, barneyY - 60, 'OI!!', '#FF8F00'); msg = 'Hit by a resident!'; }
      else { spawnScorePopup(WAGON_X, barneyY - 60, 'SQUEAK!', '#F48FB1'); msg = 'Hit a rat!'; }
      announceStatus(msg + ' ' + lives + ' lives remaining.');
    }

    function handleCollect(col) {
      col.active = false;
      if (col.type === 'bin') {
        score += 50; if (score > hiScore) hiScore = score;
        spawnScorePopup(col.x, col.y - 30, '+50', COL.uiGreen);
        sfxCollect(); spawnCollectEffect(col.x, col.y, '#FFD700');
      }
      if (col.type === 'bluebin') {
        score += 100; if (score > hiScore) hiScore = score;
        spawnScorePopup(col.x, col.y - 30, '+100 RECYCLE!', COL.uiBlue);
        sfxBonusCollect(); spawnCollectEffect(col.x, col.y, '#42A5F5');
      }
      if (col.type === 'goldbin') {
        score += 200; if (score > hiScore) hiScore = score;
        spawnScorePopup(col.x, col.y - 30, '+200 GOLD!', '#FFD700');
        sfxBonusCollect(); spawnCollectEffect(col.x, col.y, '#FFD700');
      }
      if (col.type === 'coffee') {
        score += 25; if (score > hiScore) hiScore = score;
        // Coffee = speed boost + 3 second golden invulnerability
        coffeeTimer = COFFEE_DURATION;
        speedMult = 1.5;
        invTimer = Math.max(invTimer, COFFEE_DURATION);
        spawnScorePopup(col.x, col.y - 30, '+25 ZOOM!', '#FF8F00');
        sfxCoffee(); spawnCoffeeEffect(col.x, col.y);
        announceStatus('Coffee! Speed boost and 3 seconds of invulnerability!');
      }
      barneyFace = 'normal'; barneyFaceTimer = 40;
    }

    // ==================== UPDATE ====================
    function update(dt) {
      bgScroll += speed * speedMult * 0.5 * dt;
      roadScroll += speed * speedMult * dt;
      exhaustTimer -= dt;

      // Lane lerp — framerate-correct exponential decay
      const targetY = LANE_Y[barneyTargetLane];
      barneyY += (targetY - barneyY) * (1 - Math.pow(0.85, dt));
      if (Math.abs(barneyY - targetY) < 1) { barneyY = targetY; barneyLane = barneyTargetLane; }

      // Bounce decay
      if (wagonBounce > 0) wagonBounce = Math.max(0, wagonBounce - 1.5 * dt);

      // Face management
      if (barneyFaceTimer > 0) {
        barneyFaceTimer -= dt;
        if (barneyFaceTimer <= 0) { barneyFaceTimer = 0; barneyFace = 'normal'; }
      }
      blinkTimer -= dt;
      if (blinkTimer <= 0) { barneyFace = 'blink'; barneyFaceTimer = 8; blinkTimer = 180 + Math.floor(Math.random() * 120); }

      if (invTimer > 0) invTimer -= dt;
      if (honkTimer > 0) honkTimer -= dt;

      // Coffee power-up countdown
      if (coffeeTimer > 0) {
        coffeeTimer -= dt;
        invTimer = Math.max(invTimer, dt); // stay invulnerable for full duration
        if (coffeeTimer <= 0) {
          coffeeTimer = 0;
          speedMult = 1;
          announceStatus('Speed boost ended.');
        }
      }

      // Distance score — accumulate dt, trigger once per 60 "frames" (1 real second)
      distScoreTimer += dt;
      if (distScoreTimer >= 60) { distScoreTimer -= 60; score += level; if (score > hiScore) hiScore = score; }

      // Level up every 30 seconds (1800 frames at 60fps), max level 8
      const newLevel = Math.min(8, 1 + Math.floor(frameCount / 1800));
      if (newLevel > level) {
        level = newLevel;
        bonusRound = (level === 4);
        if (level === 3 && bossPhase === 'none') {
          triggerFreddieLevel();
        } else if (level === 6 && bossPhase === 'none') {
          triggerBossLevel();
        } else if (level === 8) {
          speed = 14;
          sfxLevelUp();
          spawnScorePopup(W / 2 - 90, H / 2 - 14, 'HYPERSPEED!!', '#FFD700');
          spawnScorePopup(W / 2 - 90, H / 2 + 14, 'MAX SPEED! +1000', '#FF69B4');
          if (!hyperSpeedAwarded) {
            hyperSpeedAwarded = true;
            score += 1000; if (score > hiScore) hiScore = score;
          }
          announceStatus('HYPERSPEED! Maximum speed! +1000 bonus points!');
        } else if (bonusRound) {
          speed = Math.min(12, 5.0 + (level - 1) * 0.9);
          obstacles = []; // clear the road — no hazards in bonus round
          sfxLevelUp();
          spawnScorePopup(W / 2 - 75, H / 2, 'BONUS ROUND!', '#FF69B4');
          announceStatus('BONUS ROUND! Gold bins worth double points for 30 seconds!');
        } else {
          speed = Math.min(12, 5.0 + (level - 1) * 0.9);
          sfxLevelUp();
          spawnScorePopup(W / 2 - 60, H / 2, `LEVEL ${level}! FASTER!`, COL.uiGold);
          announceStatus('Level ' + level + '! Speed increasing.');
        }
      }

      // Spawn
      nextSpawn -= dt;
      if (nextSpawn <= 0) { spawnEntity(); nextSpawn = getSpawnInterval() + Math.floor(Math.random() * 20); }

      // Move entities
      obstacles.forEach(o => {
        o.x -= speed * speedMult * dt; o.frame += dt;
        if (o.dodging) { o.y += o.dodgeVy * dt; if (o.y < ROAD_TOP - 70) o.active = false; }
      });
      collectibles.forEach(c => { c.x -= speed * speedMult * dt; c.frame += dt; });
      obstacles = obstacles.filter(o => o.x > -200 && o.active);
      collectibles = collectibles.filter(c => c.x > -200 && c.active);

      checkCollisions();
    }

    // ==================== DRAW ====================
    function draw() {
      ctx.clearRect(0, 0, W, H);
      drawSky(); drawClouds(); drawBuildings(); drawLampPosts(); drawPavement(); drawRoad();

      collectibles.forEach(c => {
        const bob = Math.sin(frameCount * 0.08 + c.x * 0.01) * 4;
        if (c.type === 'bin') drawBin(c.x, c.y, bob);
        if (c.type === 'bluebin') drawBlueBin(c.x, c.y, bob);
        if (c.type === 'goldbin') drawGoldBin(c.x, c.y, bob);
        if (c.type === 'coffee') drawCoffeeCup(c.x, c.y, bob);
      });

      obstacles.forEach(o => {
        if (o.type === 'pothole') drawPothole(o.x, o.y);
        if (o.type === 'rubbish') drawRubbishPile(o.x, o.y);
        if (o.dodging) { drawScaredNPC(o.type, o.x, o.y); }
        else {
          if (o.type === 'miggins') drawMrsMiggins(o.x, o.y, o.frame);
          if (o.type === 'grumpy') drawMrGrumpy(o.x, o.y, o.frame);
        }
        if (o.type === 'rat') drawRat(o.x, o.y, o.frame);
      });

      // Wagon — golden during coffee boost, flickers during hit invulnerability
      const bounce = Math.sin(wagonBounce * 0.8) * wagonBounce * 0.8;
      if (coffeeTimer > 0) {
        drawWagon(WAGON_X, barneyY, bounce, true);   // solid gold, no flicker
      } else if (invTimer <= 0 || Math.floor(invTimer / 6) % 2 === 0) {
        drawWagon(WAGON_X, barneyY, bounce, false);  // normal or flickering
      }

      updateAndDrawParticles();
      updateDrawPopups();
      drawUI();
      drawHitFlash();
    }

    function drawGameOver() {
      draw();
      // Background panel — taller to fit leaderboard
      ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(130, 60, 540, 340);
      ctx.fillStyle = COL.uiRed; ctx.fillRect(130, 60, 540, 5); ctx.fillRect(130, 395, 540, 5);
      // Title + sprite
      ctx.fillStyle = COL.uiRed; ctx.font = 'bold 38px Courier New'; ctx.fillText('GAME OVER!', 205, 120);
      drawSprite(S_BARNEY_OOF, 600, 68, 1.1);
      // Score
      ctx.fillStyle = COL.uiGold; ctx.font = 'bold 20px Courier New';
      ctx.fillText(`YOUR SCORE: ${String(score).padStart(7, '0')}`, 195, 160);
      if (score > 0 && score >= hiScore) { ctx.fillStyle = '#FF8A65'; ctx.font = 'bold 14px Courier New'; ctx.fillText('★ NEW PERSONAL BEST! ★', 250, 183); }
      // Leaderboard
      ctx.fillStyle = '#80CBC4'; ctx.font = 'bold 13px Courier New';
      const boardLabel = SUPABASE_ON ? '─── GLOBAL HIGH SCORES ───' : '─── HIGH SCORES ───';
      ctx.fillText(boardLabel, SUPABASE_ON ? 238 : 270, 210);
      if (leaderboard.length === 0) {
        ctx.fillStyle = '#666'; ctx.font = '13px Courier New'; ctx.fillText('No scores yet — be the first!', 235, 235);
      } else {
        leaderboard.forEach(function (entry, i) {
          const highlight = entry.score === score;
          ctx.fillStyle = highlight ? COL.uiGold : (i === 0 ? '#FF8A65' : '#B0BEC5');
          ctx.font = (highlight ? 'bold' : '') + ' 13px Courier New';
          const medal = i === 0 ? '★' : (i === 1 ? '✦' : (i === 2 ? '•' : ' '));
          ctx.fillText(medal + ' ' + (i + 1) + '. ' + entry.name.padEnd(7) + ' ' + String(entry.score).padStart(7, '0'), 218, 232 + i * 22);
        });
      }
      // Restart prompt
      ctx.fillStyle = COL.uiGreen; ctx.font = 'bold 15px Courier New';
      if (Math.floor(frameCount / 25) % 2 === 0) ctx.fillText('PRESS ENTER, SPACE OR TAP TO PLAY AGAIN', 152, 378);
    }

      fc('#1976D2'); ctx.fillRect(bx - 5,  by + 34, 10, 56);
      fc('#0D47A1');
      ctx.fillRect(bx - 40, by + 50, 36, 4); ctx.fillRect(bx + 4, by + 50, 36, 4);

      // === HEAVY STEEL-TOED BOOTS ===
      fc('#3E2723'); ctx.fillRect(bx - 44, by + 90, 38, 18); ctx.fillRect(bx + 6, by + 90, 38, 18);
      fc('#2E1B18'); ctx.fillRect(bx - 50, by + 97, 44, 12); ctx.fillRect(bx + 6, by + 97, 44, 12);
      fc('#5D4037'); ctx.fillRect(bx - 42, by + 92, 30, 5);  ctx.fillRect(bx + 8, by + 92, 30, 5);
      // boot stitching
      fc('#4E342E');
      for (let s = 0; s < 5; s++) {
        ctx.fillRect(bx - 46 + s * 8, by + 100, 5, 2);
        ctx.fillRect(bx + 6  + s * 8, by + 100, 5, 2);
      }

      // === BOSS HP BAR ===
      const barW = 140, barH = 13, barX = bx - 70, barY = by - 192;
      ctx.fillStyle = '#111'; ctx.fillRect(barX - 3, barY - 3, barW + 6, barH + 6);
      ctx.fillStyle = '#4A0000'; ctx.fillRect(barX, barY, barW, barH);
      const hpRatio = bossHp / 6;
      ctx.fillStyle = hpRatio <= 0.33 ? '#FF1744' : hpRatio <= 0.66 ? '#FF6F00' : '#FF8F00';
      ctx.fillRect(barX, barY, Math.round(barW * hpRatio), barH);
      ctx.fillStyle = '#222';
      for (let i = 1; i < 6; i++) ctx.fillRect(barX + Math.round(barW / 6 * i) - 1, barY, 2, barH);
      ctx.fillStyle = '#FFF'; ctx.font = 'bold 11px Courier New';
      ctx.textAlign = 'center'; ctx.fillText('FREDDIE HP', bx, barY - 5);
      ctx.textAlign = 'left';

      ctx.restore();
    }

    // ── FREDDIE INTRO — 7-second multi-stage dramatic sequence ──────────────
    function drawFreddieIntro() {
      const t = bossIntroTimer;
      // Progressive darkness
      const darken = Math.min(0.93, (780 - Math.max(0, t)) / 55 * 0.93);
      ctx.fillStyle = `rgba(0,0,0,${darken})`; ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center';

      // ── Stage 0: Warning flicker (780 → 720) ──
      if (t > 720) {
        ctx.globalAlpha = Math.min(1, (780 - t) / 22);
        if (Math.floor(frameCount / 7) % 2 === 0) {
          ctx.fillStyle = '#FF8F00'; ctx.font = 'bold 26px Courier New';
          ctx.fillText('WARNING: CONSTRUCTION ZONE AHEAD', W / 2, H / 2 - 12);
        }
        ctx.fillStyle = '#FFD700'; ctx.font = '15px Courier New';
        ctx.fillText('HAZARDOUS AREA — AUTHORISED PERSONNEL ONLY', W / 2, H / 2 + 22);
        ctx.globalAlpha = 1; ctx.textAlign = 'left'; return;
      }

      // ── Stage 1: Toxic hazard pulse (720 → 660) ──
      if (t > 660) {
        const pulse = 0.55 + 0.45 * Math.sin(frameCount * 0.28);
        ctx.fillStyle = `rgba(100,255,0,${pulse * 0.13})`; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#76FF03'; ctx.font = 'bold 23px Courier New';
        ctx.fillText('TOXIC HAZARD DETECTED', W / 2, H / 2 - 18);
        ctx.fillStyle = '#AEEA00'; ctx.font = '15px Courier New';
        ctx.fillText('Large hostile entity approaching construction site...', W / 2, H / 2 + 18);
        ctx.textAlign = 'left'; return;
      }

      // ── Stage 2: NAME SLAM with sfx (660 → 600) ──
      if (t > 600) {
        if (t > 654) { // entry flash + slam SFX once
          const fl = (t - 654) / 6;
          ctx.fillStyle = `rgba(255,70,0,${fl * 0.85})`; ctx.fillRect(0, 0, W, H);
          if (t >= 658 && t < 660) sfxNameSlam();
        }
        const progress = Math.min(1, (660 - t) / 32);
        const sc = 0.5 + progress * 0.5;
        ctx.save(); ctx.translate(W / 2, H / 2 - 20); ctx.scale(sc, sc);
        ctx.fillStyle = '#FF3D00'; ctx.font = 'bold 44px Courier New'; ctx.fillText('FREDDIE THE', 0, -32);
        ctx.fillStyle = '#FF6D00'; ctx.font = 'bold 54px Courier New'; ctx.fillText('TOXIC FOREMAN!', 0, 30);
        ctx.restore();
        ctx.fillStyle = '#FF5252'; ctx.font = 'bold 14px Courier New';
        ctx.fillText('— BOSS INCOMING —', W / 2, H / 2 + 72);
        ctx.fillStyle = '#FFD700'; ctx.font = '12px Courier New';
        ctx.fillText('DODGE barrels with  UP DOWN  |  FIRE BACK with  SPACE', W / 2, H / 2 + 96);
        ctx.textAlign = 'left'; return;
      }

      // ── Dialogue box helper ──
      function dlgBox(isFreddie, lines) {
        ctx.save();
        const bx = 50, by = H - 168, bw = 700, bh = 140;
        ctx.fillStyle = isFreddie ? 'rgba(26,0,0,0.97)' : 'rgba(0,12,32,0.97)';
        ctx.fillRect(bx, by, bw, bh);
        ctx.strokeStyle = isFreddie ? '#FF3D00' : '#FFD700';
        ctx.lineWidth = 3; ctx.strokeRect(bx, by, bw, bh);
        ctx.fillStyle = isFreddie ? '#FF3D00' : '#FFD700';
        ctx.fillRect(bx, by, bw, 5);
        ctx.textAlign = 'left';
        ctx.fillStyle = isFreddie ? '#FF6D00' : '#FFD700';
        ctx.font = 'bold 15px Courier New';
        ctx.fillText(isFreddie ? 'FREDDIE THE TOXIC FOREMAN:' : 'BARNEY:', bx + 16, by + 28);
        ctx.fillStyle = '#FFFFFF'; ctx.font = '14px Courier New';
        lines.forEach((l, i) => ctx.fillText(l, bx + 16, by + 60 + i * 28));
        ctx.restore(); ctx.textAlign = 'center';
      }

      // ── Stage 3: Freddie threat 1 (600 → 420) — 3 seconds ──
      if (t > 420) {
        ctx.save(); drawFreddieBoss(bossX, bossY, frameCount * 0.35, 0); ctx.restore();
        dlgBox(true, [
          "\"You think YOUR lot can clean up MY construction site?! HA!\"",
          "\"I've buried better bin men than you, mate. WAHAHAHAHA!!\"",
        ]); ctx.textAlign = 'left'; return;
      }

      // ── Stage 4: Freddie threat 2 (420 → 240) — 3 seconds ──
      if (t > 240) {
        ctx.save(); drawFreddieBoss(bossX, bossY, frameCount * 0.35, 0); ctx.restore();
        dlgBox(true, [
          "\"I'll BURY you in toxic waste, bin man!\"",
          "\"These barrels'll flatten ya good and proper! You're RUBBISH!!\"",
        ]); ctx.textAlign = 'left'; return;
      }

      // ── Stage 5: Barney responds (240 → 90) — 2.5 seconds ──
      if (t > 90) {
        ctx.save(); drawSprite(S_BARNEY_FACE, 62, H - 246, 2.4); ctx.restore();
        dlgBox(false, [
          "\"Right mate... Health and Safety says this site needs a PROPER clear-up!\"",
          "\"...and I've got a fresh brew waiting for after.  HONK HONK!\"",
        ]); ctx.textAlign = 'left'; return;
      }

      // ── Stage 6: FIGHT! (90 → 0) ──
      const fp = 0.84 + 0.16 * Math.sin(frameCount * 0.38);
      ctx.save(); ctx.translate(W / 2, H / 2); ctx.scale(fp, fp);
      ctx.fillStyle = '#FF1744'; ctx.font = 'bold 80px Courier New';
      ctx.fillText('FIGHT!', 0, 24);
      ctx.restore(); ctx.textAlign = 'left';
    }

    function drawRatKingBoss(bx, by, frame, flashTimer) {
      const cx = ctx;
      const flash = flashTimer > 0;
      const bodyCol  = flash ? '#FFFFFF' : '#757575';
      const darkCol  = flash ? '#FFFFFF' : '#424242';
      const bellyCol = flash ? '#FFFFFF' : '#BDBDBD';
      const crownCol = flash ? '#FFFFFF' : '#FFD700';
      const gemCol   = flash ? '#FFFFFF' : '#F44336';
      const eyeCol   = flash ? '#FFFFFF' : '#FF1744';
      const noseCol  = flash ? '#FFFFFF' : '#CC1100';
      const earCol   = flash ? '#FFFFFF' : '#C2185B';
      const tailCol  = flash ? '#FFFFFF' : '#F8BBD0';

      // Scale: boss is about 3× normal rat — ~96px wide, ~60px tall
      const s = 3; // pixel size
      // Crown (sits above head)
      cx.fillStyle = crownCol;
      cx.fillRect(bx - 30, by - 58, 60, 18);      // crown band
      // crown points
      [[0,18],[20,18],[40,18]].forEach(([ox]) => {
        cx.fillRect(bx - 30 + ox, by - 76, 18, 20);
      });
      cx.fillStyle = gemCol;
      cx.beginPath(); cx.arc(bx - 30 + 9, by - 65, 5, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(bx + 9,       by - 65, 5, 0, Math.PI * 2); cx.fill();
      cx.beginPath(); cx.arc(bx - 30 + 29, by - 65, 4, 0, Math.PI * 2); cx.fill();

      // Ears (large, pink inside)
      cx.fillStyle = darkCol; cx.fillRect(bx - 14, by - 44, 20, 20);
      cx.fillStyle = earCol;  cx.fillRect(bx - 10, by - 40, 12, 12);

      // Body
      cx.fillStyle = bodyCol;
      cx.beginPath(); cx.ellipse(bx, by, 44, 34, 0, 0, Math.PI * 2); cx.fill();

      // Belly
      cx.fillStyle = bellyCol;
      cx.beginPath(); cx.ellipse(bx + 6, by + 4, 28, 22, 0.1, 0, Math.PI * 2); cx.fill();

      // Snout / head — pushed left (boss faces left toward player)
      cx.fillStyle = bodyCol;
      cx.beginPath(); cx.ellipse(bx - 38, by - 8, 20, 16, 0, 0, Math.PI * 2); cx.fill();

      // Nose
      cx.fillStyle = noseCol;
      cx.beginPath(); cx.arc(bx - 56, by - 8, 5, 0, Math.PI * 2); cx.fill();

      // Eye
      cx.fillStyle = eyeCol;
      cx.beginPath(); cx.arc(bx - 30, by - 18, 5, 0, Math.PI * 2); cx.fill();
      cx.fillStyle = '#000'; cx.beginPath(); cx.arc(bx - 29, by - 19, 2, 0, Math.PI * 2); cx.fill();

      // Whiskers
      cx.strokeStyle = darkCol; cx.lineWidth = 2;
      [[-3],[-1],[1]].forEach(([oy]) => {
        cx.beginPath(); cx.moveTo(bx - 56, by - 8 + oy * 3); cx.lineTo(bx - 80, by - 12 + oy * 3); cx.stroke();
        cx.beginPath(); cx.moveTo(bx - 56, by - 8 + oy * 3); cx.lineTo(bx - 80, by - 4 + oy * 3); cx.stroke();
      });

      // Arms reaching forward (animated)
      const armSwing = Math.sin(frame * 0.1) * 8;
      cx.fillStyle = bodyCol;
      cx.fillRect(bx - 60, by + armSwing - 6, 20, 10);
      cx.fillRect(bx - 60, by - armSwing + 10, 20, 10);

      // Legs (animated)
      const legSwing = Math.sin(frame * 0.12) * 6;
      cx.fillStyle = darkCol;
      cx.fillRect(bx - 16, by + 30, 12, 14 + legSwing);
      cx.fillRect(bx + 4,  by + 30, 12, 14 - legSwing);

      // Tail — pink curve to the right
      cx.strokeStyle = tailCol; cx.lineWidth = 6; cx.lineCap = 'round';
      cx.beginPath();
      cx.moveTo(bx + 44, by + 10);
      cx.quadraticCurveTo(bx + 80, by - 10 + Math.sin(frame * 0.08) * 10, bx + 90, by + 30);
      cx.stroke();

      // HP bar above boss
      const barW = 120, barH = 10;
      const barX = bx - barW / 2, barY = by - 100;
      cx.fillStyle = '#333'; cx.fillRect(barX - 2, barY - 2, barW + 4, barH + 4);
      cx.fillStyle = '#FF1744'; cx.fillRect(barX, barY, barW * (bossHp / 6), barH);
      cx.fillStyle = '#EF9A9A';
      for (let i = 1; i < 6; i++) {
        cx.fillRect(barX + barW / 6 * i - 1, barY, 2, barH);
      }
      cx.fillStyle = '#FFF'; cx.font = 'bold 11px Courier New'; cx.textAlign = 'center';
      cx.fillText('RAT KING HP', bx, barY - 5);
      cx.textAlign = 'left';
    }

    function drawSpeechBubble(bx, by, text) {
      const cx = ctx;
      const pad = 10;
      cx.font = 'bold 13px Courier New';
      const tw = cx.measureText(text).width;
      const bw = tw + pad * 2, bh = 30;
      const tx = bx - bw - 20, ty = by - 90;
      // bubble
      cx.fillStyle = '#FFFDE7'; cx.strokeStyle = '#F57F17'; cx.lineWidth = 2;
      cx.beginPath();
      const r = 8;
      cx.moveTo(tx + r, ty); cx.lineTo(tx + bw - r, ty); cx.arcTo(tx + bw, ty, tx + bw, ty + r, r);
      cx.lineTo(tx + bw, ty + bh - r); cx.arcTo(tx + bw, ty + bh, tx + bw - r, ty + bh, r);
      cx.lineTo(tx + r, ty + bh); cx.arcTo(tx, ty + bh, tx, ty + bh - r, r);
      cx.lineTo(tx, ty + r); cx.arcTo(tx, ty, tx + r, ty, r); cx.closePath();
      cx.fill(); cx.stroke();
      // tail pointing right toward boss
      cx.fillStyle = '#FFFDE7';
      cx.beginPath(); cx.moveTo(tx + bw - 5, ty + bh - 5); cx.lineTo(tx + bw + 15, ty + bh + 5); cx.lineTo(tx + bw - 5, ty + bh + 5); cx.closePath(); cx.fill();
      cx.strokeStyle = '#F57F17';
      cx.beginPath(); cx.moveTo(tx + bw - 5, ty + bh - 5); cx.lineTo(tx + bw + 15, ty + bh + 5); cx.stroke();
      // text
      cx.fillStyle = '#5D4037'; cx.font = 'bold 13px Courier New';
      cx.fillText(text, tx + pad, ty + 20);
    }

    function updateBoss(dt) {
      bossFrame += dt;
      bossFlashTimer = Math.max(0, bossFlashTimer - dt);
      bgScroll += 2 * dt;

      if (bossPhase === 'intro') {
        bossIntroTimer -= dt;
        if (bossIntroTimer <= 0) bossPhase = 'fight';
        return;
      }

      if (bossPhase === 'defeated') {
        bossDefeatTimer -= dt;
        if (bossDefeatTimer <= 0) {
          if (bossType === 'freddie') {
            // Freddie defeated → reward with Bonus Round at level 4
            state = 'playing'; bossPhase = 'none'; bossType = 'ratking';
            level = 4; frameCount = level * 1800;
            speed = Math.min(12, 5.0 + (level - 1) * 0.9);
            bonusRound = true; hyperSpeedAwarded = false;
            obstacles = []; collectibles = []; missiles = []; bossProjectiles = [];
            spawnScorePopup(W / 2 - 80, H / 2 - 14, 'BONUS ROUND!', '#FFD700');
            spawnScorePopup(W / 2 - 80, H / 2 + 14, 'COLLECT EVERYTHING!', '#80CBC4');
          } else {
            // Rat King defeated → resume normal play at level 7
            state = 'playing'; bossPhase = 'none';
            level = 7; frameCount = level * 1800;
            speed = Math.min(12, 5.0 + (level - 1) * 0.9);
            bonusRound = false;
            obstacles = []; collectibles = []; missiles = []; bossProjectiles = [];
            spawnScorePopup(W / 2 - 60, H / 2, 'LEVEL 7! FASTER!', COL.uiGold);
          }
        }
        return;
      }

      // ── FIGHT ──

      // Boss vertical movement
      bossMoveTimer -= dt;
      if (bossMoveTimer <= 0) {
        bossMoveTimer = 90 + Math.random() * 60;
        bossTargetY = ROAD_TOP + 30 + Math.random() * (ROAD_H - 60);
      }
      bossY += (bossTargetY - bossY) * (1 - Math.pow(0.96, dt));

      // Boss throws projectile at player
      bossThrowTimer -= dt;
      if (bossThrowTimer <= 0) {
        bossThrowTimer = 80 + Math.random() * 60;
        const targetY = LANE_Y[Math.floor(Math.random() * 3)];
        const dx = 80 - (W - 80); // approx wagon x - boss x
        const dy = targetY - bossY;
        const spd = 5;
        const dist = Math.sqrt(dx * dx + dy * dy);
        bossProjectiles.push({ x: bossX - 60, y: bossY, vx: dx / dist * spd, vy: dy / dist * spd });
        if (bossType === 'freddie') sfxBarrelThrow();
      }

      // Auto-fire missiles every 2.5 seconds (so boss isn't too easy)
      bossAutoFireTimer -= dt;
      if (bossAutoFireTimer <= 0) {
        bossAutoFireTimer = 150;
        fireMissile();
      }

      // Move missiles
      missiles.forEach(m => { m.x += m.speed * dt; });
      missiles = missiles.filter(m => m.x < W + 40);

      // Move boss projectiles
      bossProjectiles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; });
      bossProjectiles = bossProjectiles.filter(p => p.x > -40 && p.y > -40 && p.y < H + 40);

      // Missile hits boss
      const bossHitRadius = bossType === 'freddie' ? 90 : 45;
      missiles.forEach(m => {
        if (m.x > bossX - 70 && m.x < bossX + 20 && Math.abs(m.y - bossY) < bossHitRadius) {
          m.x = W + 100; // remove
          bossHp--;
          bossFlashTimer = 18;
          if (bossType === 'freddie') sfxFreddieHit();
          spawnCollectEffect(bossX - 30, bossY, '#FFD700');
          if (bossHp <= 0) {
            bossPhase = 'defeated';
            bossDefeatTimer = 240;
            startBgMusic('bossVictory', bossVictoryTrack);
            score += 500; if (score > hiScore) hiScore = score;
            spawnScorePopup(W / 2 - 70, H / 2 - 20, 'BOSS DEFEATED!', '#FFD700');
            spawnScorePopup(W / 2 - 50, H / 2 + 10, '+500 PTS!', '#FF69B4');
          }
        }
      });

      // Missile intercepts barrel (SPACE to reflect) — only for Freddie
      if (bossType === 'freddie') {
        missiles.forEach(m => {
          bossProjectiles.forEach(p => {
            if (p.x > -40 && m.x < W + 40 && Math.abs(m.x - p.x) < 30 && Math.abs(m.y - p.y) < 28) {
              m.x = W + 100; // remove missile
              p.x = -100;    // remove barrel (reflected)
              bossHp--;
              bossFlashTimer = 18;
              sfxFreddieHit();
              spawnCollectEffect(p.x + 100, p.y, '#00FF88');
              if (bossHp <= 0) {
                bossPhase = 'defeated';
                bossDefeatTimer = 240;
                startBgMusic('bossVictory', bossVictoryTrack);
                score += 500; if (score > hiScore) hiScore = score;
                spawnScorePopup(W / 2 - 70, H / 2 - 20, 'BOSS DEFEATED!', '#FFD700');
                spawnScorePopup(W / 2 - 50, H / 2 + 10, '+500 PTS!', '#FF69B4');
              }
            }
          });
        });
      }

      // Boss projectile hits wagon — use same x range as normal obstacle collision
      if (invTimer <= 0) {
        bossProjectiles.forEach(p => {
          if (p.x > WAGON_X - 95 && p.x < WAGON_X + 75 && Math.abs(p.y - barneyY) < 38) {
            p.x = -100; // remove
            lives--;
            invTimer = 90;
            flashTimer = 30;
            barneyFace = 'scared'; barneyFaceTimer = 60;
            wagonBounce = 8;
            if (lives <= 0) {
              state = 'gameover';
              startBgMusic('gameover', gameOverTrack);
            }
          }
        });
      }
      bossProjectiles = bossProjectiles.filter(p => p.x > -40);

      // Speech bubble — show a quote every 5-8 seconds
      bossQuoteTimer -= dt;
      if (bossQuoteTimer <= 0) {
        const qPool = bossType === 'freddie' ? FREDDIE_QUOTES : VILLAIN_QUOTES;
        bossQuote = qPool[Math.floor(Math.random() * qPool.length)];
        bossQuoteShowTimer = 180;
        bossQuoteTimer = 300 + Math.random() * 180;
      }
      if (bossQuoteShowTimer > 0) bossQuoteShowTimer -= dt;

      // Barney lane movement also works in boss state (handled by input already)
      const targetY = LANE_Y[barneyTargetLane];
      barneyY += (targetY - barneyY) * (1 - Math.pow(0.85, dt));
      if (Math.abs(barneyY - targetY) < 1) { barneyY = targetY; barneyLane = barneyTargetLane; }
      if (invTimer > 0) invTimer -= dt;
      if (flashTimer > 0) flashTimer -= dt;
      if (honkTimer > 0) honkTimer -= dt;
    }

    function drawBossLevel() {
      // Draw a dark city backdrop
      ctx.clearRect(0, 0, W, H);
      // Sky — ominous dark red/purple gradient
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, '#1A0A0A');
      grad.addColorStop(0.5, '#2D0A1E');
      grad.addColorStop(1, '#3E0A0A');
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
      drawClouds();
      drawBuildings();
      drawLampPosts();
      drawPavement();
      drawRoad();

      if (bossPhase === 'intro') {
        if (bossType === 'freddie') {
          drawFreddieIntro();
        } else {
          // Rat King intro
          ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, W, H);
          const pulse = 0.85 + 0.15 * Math.sin(frameCount * 0.12);
          ctx.save(); ctx.translate(W / 2, H / 2 - 30); ctx.scale(pulse, pulse);
          ctx.fillStyle = '#FF1744'; ctx.font = 'bold 36px Courier New'; ctx.textAlign = 'center';
          ctx.fillText('⚠  THE RAT KING', 0, -10);
          ctx.fillText('APPROACHES...  ⚠', 0, 30);
          ctx.fillStyle = '#FFD700'; ctx.font = 'bold 16px Courier New';
          ctx.fillText('Arm your detergent missiles!', 0, 70);
          ctx.fillText('[SPACE / HONK] to fire', 0, 92);
          ctx.restore();
          ctx.textAlign = 'left';
        }
        return;
      }

      // Draw missile(s)
      missiles.forEach(m => drawDetergentMissile(m.x, m.y));

      // Draw projectiles — barrels for Freddie, rubbish for Rat King
      if (bossType === 'freddie') {
        bossProjectiles.forEach(p => drawToxicBarrel(p.x, p.y));
      } else {
        bossProjectiles.forEach(p => drawRubbishProjectile(p.x, p.y));
      }

      // Draw the boss
      if (bossType === 'freddie') {
        drawFreddieBoss(bossX, bossY, bossFrame, bossFlashTimer);
      } else {
        drawRatKingBoss(bossX, bossY, bossFrame, bossFlashTimer);
      }

      // Speech bubble
      if (bossQuoteShowTimer > 0 && bossQuote) {
        drawSpeechBubble(bossX, bossY, bossQuote);
      }

      // Draw wagon (invulnerable flash)
      if (invTimer <= 0 || Math.floor(invTimer / 6) % 2 === 0) drawWagon(WAGON_X, barneyY, 0, false);

      updateAndDrawParticles();
      updateDrawPopups();
      drawUI();
      drawHitFlash();

      if (bossPhase === 'defeated') {
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#FFD700'; ctx.font = 'bold 32px Courier New'; ctx.textAlign = 'center';
        if (bossType === 'freddie') {
          ctx.fillText('FREDDIE IS DEFEATED!', W / 2, H / 2 - 20);
          ctx.fillStyle = '#FF69B4'; ctx.font = 'bold 18px Courier New';
          ctx.fillText('+500 BONUS POINTS!', W / 2, H / 2 + 20);
          ctx.fillStyle = '#80CBC4'; ctx.font = '14px Courier New';
          ctx.fillText('BONUS ROUND INCOMING!', W / 2, H / 2 + 50);
        } else {
          ctx.fillText('THE RAT KING IS DEFEATED!', W / 2, H / 2 - 20);
          ctx.fillStyle = '#FF69B4'; ctx.font = 'bold 18px Courier New';
          ctx.fillText('+500 BONUS POINTS!', W / 2, H / 2 + 20);
          ctx.fillStyle = '#80CBC4'; ctx.font = '14px Courier New';
          ctx.fillText('Resuming normal run...', W / 2, H / 2 + 50);
        }
        ctx.textAlign = 'left';
      }
    }

    // ==================== GAME CONTROL ====================
    function startGame() {
      ensureAudio();
      state = 'playing';
      score = 0; lives = 3; level = 1;
      speed = 5.0; speedMult = 1; coffeeTimer = 0;
      bonusRound = false; hyperSpeedAwarded = false; distScoreTimer = 0;
      barneyLane = 1; barneyTargetLane = 1; barneyY = LANE_Y[1];
      obstacles = []; collectibles = []; particles = []; scorePopups = [];
      missiles = []; bossProjectiles = [];
      bossPhase = 'none'; bossType = 'ratking'; bossHp = 6; bossFlashTimer = 0; bossQuote = ''; bossQuoteTimer = 0; bossQuoteShowTimer = 0;
      nextSpawn = 80; invTimer = 0; flashTimer = 0; wagonBounce = 0;
      barneyFace = 'normal'; barneyFaceTimer = 0; blinkTimer = 200;
      frameCount = 0; roadScroll = 0;
      announceStatus('Game started. Level 1. 3 lives. Grab coffee for a speed boost!');
      canvas.focus();
    }

    // ==================== INPUT ====================
    const keys = {};
    document.addEventListener('keydown', e => {
      if (keys[e.code]) return;
      keys[e.code] = true; ensureAudio();
      if (state === 'playing' || state === 'boss') {
        if ((e.code === 'ArrowUp' || e.code === 'KeyW') && barneyTargetLane > 0) barneyTargetLane--;
        if ((e.code === 'ArrowDown' || e.code === 'KeyS') && barneyTargetLane < 2) barneyTargetLane++;
        if (state === 'playing') {
          if (e.code === 'Space' || e.code === 'KeyH') { if (honkTimer <= 0) { sfxHonk(); honkTimer = 45; honkNearby(); } }
        } else if (bossPhase === 'fight') {
          if (e.code === 'Space' || e.code === 'KeyH') fireMissile();
        }
      } else if (e.code === 'Enter' || e.code === 'Space') {
        ensureAudio();
        if (state === 'gameover') state = 'menu';
        else if (state === 'menu') startGame();
      }
      if (['ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    let touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
      touchStartY = e.touches[0].clientY; ensureAudio();
      if (state === 'gameover') state = 'menu';
      else if (state === 'menu') startGame();
      e.preventDefault();
    }, { passive: false });
    canvas.addEventListener('touchend', e => {
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (state === 'playing') {
        if (dy < -20 && barneyTargetLane > 0) barneyTargetLane--;
        if (dy > 20 && barneyTargetLane < 2) barneyTargetLane++;
        if (Math.abs(dy) < 15) { if (honkTimer <= 0) { sfxHonk(); honkTimer = 45; honkNearby(); } }
      } else if (state === 'boss') {
        if (dy < -20 && barneyTargetLane > 0) barneyTargetLane--;
        if (dy > 20 && barneyTargetLane < 2) barneyTargetLane++;
        if (Math.abs(dy) < 15 && bossPhase === 'fight') fireMissile();
      }
      e.preventDefault();
    }, { passive: false });

    // ==================== MOBILE BUTTONS ====================
    function setupMobileButtons() {
      const btnUp = document.getElementById('btn-up'), btnDown = document.getElementById('btn-down'), btnHonk = document.getElementById('btn-honk');
      if (!btnUp) return;
      function advanceState() { ensureAudio(); if (state === 'gameover') state = 'menu'; else if (state === 'menu') startGame(); }
      const onUp   = e => { e.preventDefault(); ensureAudio(); if (state === 'playing' || state === 'boss') { if (barneyTargetLane > 0) barneyTargetLane--; } else advanceState(); };
      const onDown = e => { e.preventDefault(); ensureAudio(); if (state === 'playing' || state === 'boss') { if (barneyTargetLane < 2) barneyTargetLane++; } else advanceState(); };
      const onHonk = e => { e.preventDefault(); ensureAudio(); if (state === 'playing') { if (honkTimer <= 0) { sfxHonk(); honkTimer = 45; honkNearby(); } } else if (state === 'boss' && bossPhase === 'fight') { fireMissile(); } else advanceState(); };
      btnUp.addEventListener('touchstart', onUp, { passive: false }); btnUp.addEventListener('mousedown', onUp);
      btnDown.addEventListener('touchstart', onDown, { passive: false }); btnDown.addEventListener('mousedown', onDown);
      btnHonk.addEventListener('touchstart', onHonk, { passive: false }); btnHonk.addEventListener('mousedown', onHonk);
      // Dedicated sound unlock button — always calls ensureAudio synchronously
      const btnSnd = document.getElementById('btn-snd');
      if (btnSnd) {
        const onSnd = e => { e.preventDefault(); ensureAudio(); };
        btnSnd.addEventListener('touchstart', onSnd, { passive: false });
        btnSnd.addEventListener('mousedown',  onSnd);
      }
    }
    setupMobileButtons();
    // Catch-all: any touch anywhere on the page also attempts to unlock audio
    document.addEventListener('touchstart', ensureAudio, { passive: true });

    // ==================== GAME LOOP ====================
    let prevState = null;
    let lastTime = 0;
    function loop(ts) {
      // dt = elapsed frames at 60fps; capped at 3 to absorb tab-switch spikes
      const dt = lastTime ? Math.min((ts - lastTime) / 16.667, 3) : 1;
      lastTime = ts;
      frameCount += dt;
      // Trigger music on state change
      if (state !== prevState) {
        if      (state === 'menu')     startBgMusic('menu',     menuTrack);
        else if (state === 'gameover') startBgMusic('gameover', gameOverTrack);
        else if (state === 'playing')  stopBgMusic();
        else if (state === 'boss')     startBgMusic('boss',     bossTrack);
        prevState = state;
      }
      _cloudDt = dt; _particleDt = dt; _popupDt = dt;
      if (state === 'menu') { bgScroll += 0.5 * dt; drawMenu(); }
      else if (state === 'playing') { update(dt); draw(); }
      else if (state === 'boss')    { updateBoss(dt); drawBossLevel(); }
      else if (state === 'gameover') { bgScroll += 0.2 * dt; drawGameOver(); }
      requestAnimationFrame(loop);
    }

    // ==================== INIT ====================
    // Explicitly set canvas height from its rendered width (fallback for browsers
    // where height:auto on <canvas> doesn't honour the intrinsic 800:450 ratio)
    const wrap = document.getElementById('wrap');
    function fixCanvasHeight() {
      // Use visualViewport when available — gives the true visible area on Android/iOS
      const vp = window.visualViewport;
      const vw = Math.floor(vp ? vp.width  : window.innerWidth);
      const vh = Math.floor(vp ? vp.height : window.innerHeight);

      // Subtract the mobile controls bar height so canvas + buttons both fit on screen.
      // getBoundingClientRect().height is 0 when display:none (desktop), positive on mobile.
      const ctrl = document.getElementById('mobile-controls');
      const ctrlH = ctrl ? Math.ceil(ctrl.getBoundingClientRect().height) : 0;

      // Also account for the 4px top + 4px bottom canvas border
      const availH = vh - ctrlH - 8;

      const w = Math.min(vw, 800, Math.floor(availH * 16 / 9));
      wrap.style.position  = '';
      wrap.style.left      = '';
      wrap.style.top       = '';
      wrap.style.maxWidth  = '800px';
      wrap.style.width     = '';
      wrap.style.transform = '';
      canvas.style.width   = w + 'px';
      canvas.style.height  = Math.round(w * 9 / 16) + 'px';
      canvas.style.margin  = '0 auto';
    }
    window.addEventListener('resize', fixCanvasHeight);
    // Fire twice on orientationchange: once early, once after iOS fully settles
    window.addEventListener('orientationchange', function () {
      setTimeout(fixCanvasHeight, 100);
      setTimeout(fixCanvasHeight, 400);
    });
    // visualViewport fires after the viewport truly updates — most reliable on iOS
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', fixCanvasHeight);
    }
    fixCanvasHeight();
    initClouds();
    loop();
  </script>
</body>
